body:
  text: 小說齊鬲城東有蒲臺秦始皇所頓處時始皇在臺下縈蒲以繫馬至今蒲生猶縈俗謂之始皇蒲已上亦見廣記四百八紺珠集引無末句始皇作石橋欲過海觀日出處時有神人能驅石下海石去不速神人輒鞭之皆流血至今悉赤紺珠集引作神人鞭之流血石皆赤色陽城山上石皆起立東傾如相隨狀已上亦見紺珠集二末作有趨赴之狀至今猶爾秦皇於海中作石橋或云非人功所建海神為之豎柱始皇感其惠乃通敬於神求與相見神云我形醜約莫圖我形當與帝會始皇乃從石橋入海三十里與神人相見左右巧者潛以腳畫神形神怒曰速去即轉馬前腳猶立後腳隨崩僅得登岸出三齊要略原本說郛二十五秦始皇時長人十二見於臨洮皆夷服於是鑄銅為十二枚以寫之蓋漢十二帝之瑞也廣記一百三十五滎陽板渚津原上有厄井父老云漢高祖曾避項羽於此井也為雙鳩所救故俗語云漢祖避時難隱身厄井間雙鳩集其上誰知下有人漢朝每正旦輒放雙鳩或起於此說郛二十五廣記一百三十五漢高祖手敕太子云吾遭亂世當秦禁學問生不讀書又不自喜謂讀書無所益洎踐阼以來時書乃使人知之者作之追思昔所行多不是又云堯舜不以天下與子而與他人此非為不惜天下但子不中立耳人有好牛馬尚惜況天下邪吾以汝是元子早有立意兼群臣咸稱如有汝友四皓吾所不能致而為汝來自為汝大事也今定汝為嗣又云吾生不學書但讀書問字而遂知耳以此故不大工然亦足自解今視汝書猶不如吾汝可勤學習每上疏宜自書勿使吏人也又云汝見蕭曹張陳諸公侯吾同時人倍年於汝者皆拜并語汝諸弟又云吾得疾遂困以如意母子相纍其餘諸子皆足自立哀此兒猶小也出漢書高祖手敕說郛二十五高祖初入咸陽宮周行府庫金玉珍寶不可稱言其尤驚異者有青玉九枝燈高七尺五寸下作盤龍以口銜燈燈然則鱗皆動爛炳若列星而盈室復鑄銅人十二枚坐皆高三尺列于筵上琴瑟笙竽各有所執皆點綴華彩儼若生人筵下有二銅管上口高數尺出筵後其一管空一管有繩大如指一人吹管一人約繩則琴瑟笙竽等皆作與真樂不殊有琴長六尺安十三絃二十六徽用七寶飾之銘曰璠璵之樂紺珠集二引此二句玉笛長二尺三寸六孔吹之則見車馬山林隱嶙相次吹息則不復見銘曰昭華之管有方鏡廣四尺高五尺九寸表裏有明直來照之影則倒見以手掩心而照之則知病之所在見腸胃五藏歷然無礙又女子有邪心則膽張心動始皇常以照宮人膽張心動者則殺之高祖悉封閉以待項羽羽併將以東後不知所在說郛二十五出西京雜記上文帝自代還有良馬九匹一名浮雲一名赤電一名絶群一名逸驃一名飛燕一名緑螭一名龍子一名麟駒一名絶塵號九駿有求宣能御馬代王號為王良俱還代邸出西京雜記說郛二十五漢武帝嘗微行造主人家家有婢國色帝悅之仍留宿夜與主婢臥有一書生亦寄宿善天文忽見客星將掩帝座甚逼書生大驚連呼咄咄不覺聲高仍入見一男子持刀將欲入聞書生聲急謂為己故遂縮走去客星應時而退如是者數遍帝聞其聲異而問之生具說所見帝乃悟曰此人必婢壻將欲肆其凶惡于朕仍召集門羽林語主人曰朕天子也於是禽拏問之服而誅後帝嘆曰斯蓋天啓書生於扶祐朕躬乃厚賜書生出幽冥録說郛二十五武帝時長安巧手丁緩案出西京雜記上今本作丁諼者為恆滿鐙七龍五鳳雜以芙蓉蓮藕之奇又作臥褥香爐一名被中香爐本出房風其法後絶至緩始更為之機環運轉四周而爐體常平可致之被褥故以為名又作九層博山香爐鏤為奇禽怪獸窮諸靈異皆能自然轉動又作七輪扇輪大皆徑尺相連續一人運之則滿堂皆寒戰焉說郛二十五孫氏瑞應圖云神鼎者文質精也知吉凶知存亡能輕能重能息能行不灼自沸不汲自滿中生五味王者興則出衰則去說苑云孝武時汾陰人得寶鼎獻之甘泉宮群臣畢賀上壽曰陛下得周鼎侍中吾丘壽王曰非周鼎上召問之有說則生無說則死壽王對曰周德者始於天授成於文武顯於周公德澤上畼於天下漏於三泉上天報應鼎為周出今漢繼周德顯行六合和同至陛下之身而逾盛天瑞竝至昔秦始皇親求鼎於彭城而不得天昭有德神寶自至此天所以遺漢乃漢鼎非周鼎也上曰善魏文帝典論亦云墨子曰昔夏后啓使飛廉折金以精神於昆吾使翁乙灼自若之龜鼎成四足而方不灼自烹不舉自滅不遷自行拾遺録云周末大亂九鼎飛入天池末世書論云入泗水聲轉謬焉廣記二百二十九漢武帝過李夫人就取玉簪檢頭自此宮人檢頭皆用玉簪玉倍貴焉西京雜記上有之無末二句又以象牙為篦賜李夫人廣記二百二十九漢武以雜寶粧床屏帳等設於桂宮謂之四寶宮紺珠集二海録碎事七引作謂四寶宮也成帝設雲帳雲幄雲幕於甘泉宮紫殿謂之三雲殿出西京雜記上說郛二十五紺珠集二漢成帝好蹙鞠群臣以蹙鞠勞體非尊者所宜帝曰朕好之可擇似而不勞者奏之劉向奏彈棋以獻上悅賜之青羔裘紫絲履服以朝覲廣記二百二十八廣記所引一事出西京雜記上劉向原作家君或言始於魏文帝時宮中粧奩之戲帝為之特妙能用手巾角拂之有人自言能令試之以葛巾低頭拂之更妙於帝紺珠集二魏武少時常與袁紹好為游俠觀人新婚因潛入主人園中夜叫呼云有偷兒至廬中人皆出觀帝乃抽刃劫新婦與紹還出失道墜枳棘中紹不能動帝復大呼偷兒今在此紹惶迫自擲出俱免魏武又嘗云人欲危己己輒心動因語所親小人云汝懷刃密來我心必動便戮汝汝但勿言當後相報侍者信焉遂斬之謀逆者挫氣矣又袁紹年少時曾夜遣人以劍擲魏武少下不著帝揆其後來必高因帖席臥床上劍果高魏武又云我眠中不可妄近近輒斫人亦不自覺左右宜慎之後乃佯凍所幸小人竊以被覆之因便斫殺自爾莫敢近之廣記一百九十魏武將見胸奴使以形陋不足懷遠國使崔季圭代當之自捉刀立床頭事畢令間諜問曰魏王何如使曰魏王雅望非常然床頭捉刀人乃英雄也王聞之馳殺此使廣記一百六十九晉咸康中有士人周謂者死而復生言天帝召見引升殿仰視帝面方一尺問左右曰是古張天帝邪答云上古天帝久已聖去此近曹明帝也紺珠集二晉明帝為太子時聞元帝沐上啓云臣紹言伏蒙吉日沐頭老壽多宜謹拜賀表答云春正月沐頭至今大垢臭故力沐耳得啓知汝孝愛當如今言父子享祿長生也又啓云沐伏久勞極不審尊體何如答云去垢甚佳勞不極紺珠集引作身不勞也出晉敕續談助四注云此卷並秦漢晉宋諸帝紺珠集二凌雲臺上樓觀極盛初造時先稱衆材俾輕重相稱乃結構故雖高而隨風動搖終不壞明帝登而懼其傾側命以大木扶之未幾頽壞紺珠集二晉成帝時庾后臨朝南頓王宗為禁旅官典管籥諸庾數密表疏宗宗罵言云是汝家門閣邪諸庾甚忿之託黨蘇峻誅之後帝問左右見宗室有白頭老翁何在答同蘇峻已誅帝聞之流涕後頗知其事每見諸庾道枉死帝嘗在后前乃曰阿舅何謂云人作賊輒殺之人忽言阿舅作賊當復云何庾后以牙尺打帝頭云兒何以作爾形語帝無言唯大張目熟視諸庾諸庾甚懼出雜語續談助四困學紀聞十三宣帝問真長會王如何劉惔答欲造微桓曰何如卿曰殆無異桓溫乃喟然曰時無許郭人人自以為稷契出雜記續談助四簡文在殿上行右軍與孫興公在後右軍指謂孫曰此是噉名客簡文聞之顧曰天下自有利齒兒後王光群作會稽謝車騎出曲阿視之孝伯時罷祕書丞在坐因視孝伯曰王丞齒似不鈍王曰不鈍頗有驗簡文集諸談士以致後客前客夜坐每設白粥唯然燈燈暗輒更益炷出世說續談助四佛經以為祛治神明則聖可致簡文云不知便可登峰造極不然陶冶之功故不可經出郭子續談助四簡文帝為撫軍所坐床上塵不令左右拂見鼠行之跡為佳參軍見鼠白日行以手板打殺之意不悅門下起彈辭曰鼠被害尚不能忘懷今復以鼠損人無乃不可乎出語林續談助四晉孝武帝即位時年十三四續談助引作晉孝武年十三四時冬天晝日不著復衣但著單絹裙衫五六重夜則纍茵褥謝公云體宜有常陛下晝過冷夜過熱非攝養之術帝曰夜靜故也謝公歎曰上理不減先帝出世說續談助四御覽二十七孝武未嘗見驢謝太傅問曰陛下想其形當何所似孝武掩口笑云正當似豬出世說續談助四武帝嘗於殿北窗下清暑忽見一人著白黃練單衣舉身沾濕自稱是華林園中池水神名淋涔君語帝若能見待必當相佑帝時飲已醉便取常佩刀擲之刃空過無礙神忿曰已不能佳士見接乃至於此當知之居少時而帝暴崩出幽明録續談助四宋國初建參軍高纂啓云欲量作東西堂床六尺五寸並用銀度釘未敢專輒宋武手答云床不須局腳直腳自足釘不煩銀渡鐵釘而已出宋武手敕續談助四鄭鮮之王智傅亮啓宋武云伏承明旦見南蠻明是四廢日來月朔好不審可從群情遷來月不宋武手答云勞足下勤至吾初不擇日出宋武手敕續談助四紺珠集二引有帝親為答尚在其家二句介子推不出晉文公焚林求之終抱木而死公撫木哀嗟伐樹製屐每懷割股之恩輒然流涕視屐曰悲乎足下足下之言將起於此出異苑續談助四注云此卷並周六國前漢人紺珠集二說郛二十五王子喬墓在京茂陵國亂時有人盜發之都無所見唯有一劍縣在空中欲取之劍便作龍鳴虎吼遂不敢近俄而飛上天神仙經云真人去世而多以劍代其形五百年後劍亦能靈化此其驗也出世說續談助四老子始下生乘白鹿入母胎中老子為人黃色美髮長耳廣額大目疏齒方口厚唇耳有三門鼻有雙柱足蹈五字手把十文出顧玄瀨鄉記續談助四說郛二十五襄邑縣八十里曰瀨鄉有老子廟廟中九井或云每汲一井而八井水俱動有能潔齊入祠者須水溫即隨而溫出郭子說郛二十五顏淵子路共坐於門有鬼魅求見孔子其目若日其形甚偉子路失魄口噤顏淵乃納屐拔劍而前捲扯其腰於是化為蛇遂斬之孔子出觀歎曰勇者不懼知者不惑仁者有勇勇者不必有仁說郛二十五續談助四廣記四百五十六孔子嘗使子貢出久而不返占之遇鼎弟子皆言無足不來顏回掩口而笑孔子曰回笑是謂賜必來也因問回何以知賜來對曰無足者蓋乘舟而來賜且至矣海録碎事十四節引末作鼎無足其乘舟來耶果然明旦子貢乘潮至說郛二十五紺珠集四子路顏回浴於泗水見五色鳥顏回問子路曰由識此鳥否子路曰識回曰何鳥子路曰榮之鳥後日顏回與子路又浴於泗水更見前鳥復問由識此鳥否子路曰識回曰何鳥子路曰同之鳥顏回曰何一鳥而二名子路曰譬如絲絹煮之則為帛染之則為皂一鳥而二名不亦宜乎說郛二十五孔子嘗游於山使子路取水逢虎於水所與共戰攬尾得之內懷中取水還問孔子曰上士殺虎如之何子曰上士殺虎持虎頭又問曰中士殺虎如之何子曰中士殺虎持虎耳又問下士殺虎如之何子曰下士殺虎捉虎尾子路出尾棄之因恚孔子曰夫子知水所有虎使我取水是欲死我乃懷石盤欲中孔子又問上士殺人如之何子曰上士殺人使筆端又問曰中士殺人如之何子曰中士殺人用舌端又問下士殺人如之何子曰下士殺人懷石盤子路出而棄之於是心服出衝波傳說郛二十五秦世有謠云秦始皇何強梁開吾戶據吾床飲吾漿唾吾裳餐吾飯以為糧張吾弓射東牆前至沙丘當滅亡始皇既焚書坑儒乃發孔子墓欲取經傳墓既啓遂見此謠文刊在冢壁始皇甚惡之及東游乃遠沙丘而循別路忽見群小兒攢沙為阜問之何為答云此為沙丘也從此得病而亡或云孔子將死遺書曰不知何男子自謂秦始皇上我之堂據我之床顛倒我衣裳至沙丘而亡說郛二十五安吉縣西有孔子井吳東校書郎施彥先後居井側先云仲尼聘楚為令尹子西所譖欲如吳未定逍遙此境復居井側因以名焉出山謙之吳興記續談助四說郛二十五鬼谷先生與蘇秦張儀書云二君足下功名赫赫但春華到秋不得久茂日數將冬時訖將老子獨不見河邊之樹乎僕御折其枝波浪激其根此木非與天下人有仇怨蓋所居者然子見嵩岱之松柏華霍之樹檀上葉干青雲下根通三泉上有猿狖下有赤豹麒麟千秋萬歲不逢斧斤之患此木非與天下之人有骨肉亦所居者然今二子好朝露之榮棄長久之功輕喬松之求延貴一旦之浮爵夫女愛不極席男歡不畢輪痛夫痛夫二君二君蘇秦張儀答書云伏以先生秉德含和之中游心青雲之上飢必噉芝草渴必飲玉漿德與神靈齊明與三光同不忘將書誡以行事儀以不敏名聞不昭入秦匡霸欲翼時君刺以河邊喻以深山雖復素暗誠銜斯旨出鬼谷先生書續談助四說郛二十五張子房與四皓書云良白宋吳幵優古堂詩話引至篇末張良白仰惟先生秉超世之殊操身在六合之間志凌造化之表但自大漢受命禎靈顯集神母告符足以宅兆民之心先生當此時輝神爽乎雲霄濯鳳翼於天漢使九門之外有非常之客北闕之下有神氣之賓而淵游山隱竊為先生不取也良以良薄承乏忝官謂絶景不御而駕服駑駘方今元首欽明文思百揆之佐立則延企坐則引領日仄而方丈不御夜寢而閶闔不閉蓋皇極須日月以揚光后土待嶽瀆以導滯而當聖世鸞鳳林栖不翔乎太清騏驥嶽遁不步於郊莽非所以寧八荒慰六合也不及省侍展布腹心略寫至言想料翻然不猜其意張良白四皓答書云竄蟄幽藪深谷是室豈悟雲雨之使奄然萃止方今三章之命邈殷湯之曠澤禮隆樂和四海克諧六律及於絲竹和章應於金石飛鳥翔於紫闕百獸出於九門頑夫固陋守彼巖穴足未嘗踐閶闔目未嘗見廊廟野食於豐草之中避暑於林木之下望月晦然後知三旬之終覩霜雪然後知四時之變問射夫然後知弓弩之須訊伐木然後知斧柯之用當秦項之艱難力不能負干戈攜手逃走避役山草倚朽若立循水似濟遂使青蠅盜聲於晨雞魚目竊價於隋珠公侯應靈挺特神父援策蓋無幽而不明也豈有烹鼎和味而願令菽麥廁方丈之御被龍服襄而欲使女蘿上紺綾之緒恐汨泥以濁白水飄塵以亂清風是以承命傾筐聞寵若驚謹因飛龍之使以寫鳴蟬之音乞守兔鹿之志終其寄生之命也出張良書續談助四說郛二十五晉簡文云漢世人物當推子房為標的神明之功玄勝之要莫之與二接俗而不虧其道應世而事不嬰玄識遠情超然獨邁出簡文談疏續談助四樊將軍噲問於陸賈曰自古人君皆云受命於天云有瑞應豈有是乎陸賈應之曰有夫目瞤得酒食燈火花得錢財午鵲噪而行人至蜘蛛集而百事喜小既有徵大亦宜然故云目瞤則呪之燈火花則拜之午鵲噪則餧之蜘蛛集則放之況天下之大寶人君重位非天命何以得之哉瑞寶信也天以寶為信應人之德故曰瑞應天命無信不可以力取也出西京雜記下廣記一百三十五湘州有南寺東有賈誼宅宅有井小而深上斂下大狀似壺即誼所穿井旁局腳食床容一人坐即誼所坐也出盛弘之荊州記續談助四誼宅今為陶侃廟時種甘猶有存者出庾穆之湘州記續談助四漢董仲舒嘗夢蛟龍入懷中乃作春秋繁露出西京雜記上廣記一百三十七漢文翁當起田斫柴為陂夜有百十野豬鼻戴土著柴中比曉塘成稻常收嘗欲斷一大樹欲斷處去地一丈八尺翁先呪曰吾得二千石斧當著此處因擲之正斫所欲後果為蜀郡守廣記一百三十七漢武帝見畫伯夷叔齊形像問東方朔此何人朔曰古之愚夫帝曰夫伯夷叔齊廣記引有此句天下廉士何謂愚夫邪朔對曰臣聞賢者居世與時推移不凝滯於物彼何不升其堂飲其漿泛泛如水中之鳧與彼俱游天子轂下可以隱居二句廣記引有何自苦於首陽乎上喟然而嘆出朔傳續談助四廣記一百七十三有末句漢武游上林見一好樹問東方朔朔曰名善哉帝陰使人落其樹後數歲復問朔朔曰名為瞿所帝曰朔欺久矣名與前不同何也朔曰夫大為馬小為駒長為雞小為雛大為牛小為犢人生為兒長為老且昔為善哉今為瞿所長少死生萬物敗成豈有定哉帝乃大笑廣記一百七十三武帝幸甘泉宮馳道中有蟲赤色頭目牙齒耳鼻盡具觀者莫識帝乃使朔視之還對曰此怪哉也海録碎事二十二節引作朔對曰此蟲名為怪蟲昔秦時拘繫無辜衆庶愁怨咸仰首歎曰怪哉怪哉蓋感動上天憤所生也故名怪哉此地必秦之獄處即按地圖果秦故獄又問何以去蟲朔曰凡憂者得酒而解以酒灌之當消於是使人取蟲置酒中須臾果糜散矣出朔傳說郛二十五廣記一百七十三楊雄謂長卿賦不似人間來歎服不已其友盛覽問賦何如其佳雄曰合纂組以成文列錦繡以成質雄遂箸合組之歌列錦之賦紺珠集二楊雄夢吐白鳳皇集於玄上紺珠集二俞益期豫章人與韓康伯道至交州聞馬援故事云交州在合浦徐聞縣西南窮日南壽靈縣界傳云伏波開道篙工鑿石猶有故跡又云此道廢久壅塞戴桓溝之乃得伏波時故船昔立兩銅柱於林邑岸岸北有遺兵十餘家居壽靈之南悉姓馬自相婚姻今二百戶以其流寓號曰馬流言語猶與中華同出俞益期箋續談助四注云此卷並後漢人物袁安父亡母使安以雞酒詣卜工問葬地道邊遇三書生安以雞酒禮之畢告安地曰當四世為貴公別行數步顧視皆不見因葬其地後果位至司徒子孫昌盛四世三公焉出幽明録續談助四袁安為陰平長有惠化縣先有雹淵冬夏未嘗消釋歲中輒出飛布十數里大為民害安乃推誠潔齊引愆貶己至誠感神雹遂為之沈淪伏而不起乃無苦雨淒風焉廣記一百六十一崔駰有文才其縣令往造之駰子瑗年九歲書門曰人雖干木君非文侯何為光光入我里閭令見之問駰駰曰必瑗所書召瑗將詰所書乃曰君使臣以禮臣事君以忠出世說續談助四胡廣以惡月生父母惡之藏之胡盧棄之河流岸側居人收養之及長有盛名父母欲取之廣以為背所生則害義背所養則忘恩兩無所歸以其託胡盧而生也乃姓胡海録碎事七引兩背字下皆有其字以其二字無胡下有名廣紺珠集二馬融歷二縣兩郡政務無為事從其約在武都七年在南郡四年未嘗按論刑殺一人性好音樂善鼓琴吹笛笛聲一發感得蜻蛚出吟有如相和善鼓琴以下亦見宋吳聿觀林詩話引笛聲作之聲脫感字及如字蛚作𧊿出融別傳續談助四廣記二百二郭林宗來游京師當還鄉里送車千許乘李膺亦在焉衆人皆詣大槐客舍而別獨膺與林宗共載乘薄笨車上大槐阪觀者數千人引領望之眇若松喬之在霄漢出膺家傳廣記一百六十四續談助四李元禮謖謖如徑松下風膺居陽城時門生在門下者恆有四五百人膺每作一文出手門下共爭之不得墮地陳仲弓初令大兒元方來見膺與言語訖遣廚中食元方喜以為合意當得復見焉廣記一百六十四膺同縣聶季寶小家子不敢見膺已上亦見龔頤正續釋常談引首膺上有李字杜周甫知季寶不能定名以語膺呼見坐置砌下牛衣上一與言即決曰此人當作國士卒如其言廣記一百六十四膺為侍御史青州凡六郡唯陳仲舉為樂安視事其餘皆病七十縣並棄官而去其威風如此廣記一百六十四陳仲舉雅重徐孺子為豫章大守至便欲先詣之主簿曰群情欲令府君先入拜陳曰武王軾商容之閭席不暇暖吾之禮賢有何不可廣記一百六十四徐樨亡海內群英論其清風高致乃比夷齊或參許由夏侯豫章追美名德立亭於樨墓首號曰思賢亭出稚別傳續談助四何顒妙有知人之鑒初同郡張仲景總角造顒顒謂曰君用思精密而韻不能高將為良醫矣仲景後果有奇術已上亦見續談助四注云出異苑王仲宣年十七時過仲景仲景謂之曰君體有病宜服五石湯若不治年及三十當眉落仲宣以其賒遠不治後至三十果覺眉落其精如此世咸歎顒之知人廣記二百十八李膺嘗以疾不迎賓客二十日乃一通客唯陳仲弓來輒乘輿出門迎之出李膺家録續談助四漢末陳太邱實與友人期行過期不至太邱捨去去後乃至其子元方年七歲在門外戲客問元方尊君在否答曰待君不至已去友人便怒曰非人與人期行相委而去元方曰君與家君期日中時過申不來則是無信對子罵父則是無禮友人慚下車引之元方遂入門不顧廣記一百七十四有客詣陳太丘談論甚久太丘乃令元方季方炊飯以延客二子委甑竊聽客語飯落成糜而進客去太丘將責之具言其故且誦客語無遺太丘曰但麋自可何必飯邪紺珠集二張衡亡月蔡雍母始懷孕此二人才貌甚相類時人云雍是衡之後身也已上亦見續談助四注云出世說初司徒王允數與雍會議允詞常屈由是銜雍及允誅董卓并收雍衆人爭之不能得太尉馬日磾謂允曰伯喈忠直素有孝行且曠世逸才多識漢事當定十志今子殺之海內失望矣允曰無蔡雍獨當無十志何損遂殺之廣記一百六十四漢王瑗遇鬼物言蔡雍作仙人飛去飛來甚快樂也紺珠集二鄭玄在徐州孔文舉時為北海相欲其返郡敦請懇惻使人繼踵又教曰鄭公久游南夏今艱難稍平儻有歸來之思無寓人於室毀傷其藩垣林木必繕治牆宇以俟還及歸融告僚屬昔周人尊師謂之尚父今可咸曰鄭君不得稱名也袁紹一見玄歎曰吾本謂鄭君東州名儒今乃是天下長者夫以布衣雄世斯豈徒然哉海録碎事七引云袁紹稱鄭玄以布衣雄世及去紹餞之城東必欲玄醉會者三百人皆使離席行觴自旦及莫計玄可飲三百餘杯而溫克之容終日無怠廣記一百六十四鄭玄葬城東後墓壞改遷厲阜縣令車子義為玄起墓亭名曰昭仁亭出玄別傳續談助四荀巨伯遠看友人疾值胡賊攻郡友人語伯曰吾且死矣子可去伯曰遠來視子今有難而捨之去豈伯行邪賊既至謂伯曰大軍至此一郡俱空汝何人獨止邪伯曰有友人疾不忍委之寧以己身代友人之命賊聞其言異之乃相謂曰我輩無義之人而入有義之國乃偃而退一郡獲全廣記二百三十五謝子微見許子政虔及弟紹曰平輿之淵有雙龍出矣出世說續談助四注云此一卷後漢人物也汝南中正周裴表稱許劭高遺風與郭林宗李元禮盧子幹陳仲弓齊名劭特有知人之鑒自漢中葉以來其狀人取士援引扶持進導招致則有郭林宗若其看形色目童齔斷冤滯擲虛名誠未有如劭之懿也嘗以簡別清濁為務有一士失其所便謂投之潢汙雖負薪抱關之類吐一善言未曾不有尋究欣然兄子政掌抵掌擊節自以為不及遠矣劭幼時謝子微便云此賢當持汝南管籥樊子昭之子年十五六為縣小吏劭一見便云汝南第三士也此可保之後果有令名出劭別傳續談助四蔡雍刻曹娥碑傍曰黃絹幼婦外孫齏臼魏武見而不能曉以問群僚莫有知者有婦人浣於江渚曰第四車中人解即禰正平也衡便以離合意解絶妙好辭出異苑說郛二十五禰正平年少與孔文舉作爾汝交時衡年未滿二十而融已五十餘矣出衡別傳續談助四紺珠集二引作禰正平年未及冠而孔文舉已逾五十相與為爾汝交孔文舉中夜暴疾命門人鑽火其夜陰暝門人忿然曰君責人太不以道今暗若漆何不把火照我當得覓鑽火具然後得火文舉聞之曰責人當以其方出俳諧文續談助四曹公與楊太尉書論刑楊修云操白足下不遺賢子見輔今軍征事大吾制鐘鼓之音主簿應掌而賢子恃豪父之勢每不與吾同懷念卿父息之情同此悼楚謹贈下錦裘二領八節銀角桃枝一枚官絹五百匹錢六十萬四望通幰七香車一乘青牸牛二頭八百里驊騮一匹戎金裝鞍轡十副鈴雹一具使二人侍衛之并遺足下貴室錯彩羅縠裘一領織成鞾一量有心青衣二人長左右所奉雖薄以表吾意足下便當慨然成納不致往返楊太尉答書云彪白小兒頑鹵常慮當致傾敗足下恩矜延罪訖今聞問之日心腸酷裂省鑒衆賜益以悲懼曹公卞夫人與太尉夫人袁書卞頓首頓首貴門不遺賢郎輔佐方今戎馬興動主簿股肱近臣征伐之計事須咨官立金鼓之節而聞命違制明公輒行軍法伏念悼痛酷楚情不自勝夫人多容即見垂恕故送衣服一籠文絹一百匹房子官錦百斤私所乘香車一乘牛一頭誠知微細以達往意望為承納楊太尉夫人袁氏答書袁頓首頓首路岐雖近不展淹久歎想之情抱勞山積小兒疏細果自招罪戾念之痛楚明公所賜已多又加重賚禮頗非宜荷受輒付往信出魏武楊彪傳續談助四司馬德操初見龐士元稱之曰此人當為南州冠冕時士元尚少及長果如徽言出徽傳續談助四司馬徽居荊州以劉表不明度必有變思退縮以自全人每與語但言佳其妻責其無別曰如汝所言亦復甚佳終免禍紺珠集二潁川太守朱府君以正月初見諸縣史燕問功曹鄭劭曰昔在京師聞公卿百僚歎述貴郡前賢後哲英雄瓌瑋然未覩其奇行異操請聞遺訓對曰鄙潁川本韓之分野豫之淵藪其於天官上當角亢之宿下稟嵩少之靈受嶽瀆之精託晉楚之際處陳鄭之末少陽之氣太清所挺是以賢聖龍蟠俊彥鳳舉昔許由巢父出於陽城樊仲甫又出陽城侯張良又出於陽城胡元安出於許縣灌彪義山出於昆陽審尋初出於定陵杜安伯夷又出於定陵蔡道出於潁陽府君曰太原周伯況汝南周彥祖皆辭徵禮之寵恐貴郡未有如此者也劭公對曰昔許由恥受堯位洗耳河漘樊仲甫者飲牛河路恥臨濁流回車旋牛二周公但讓公卿之榮以此推之天地謂之咫尺不亦遠乎出鄭邵公對潁川太守續談助四劉楨以失敬罷文帝曰卿何以不敬文憲答曰臣誠庸短亦緣陛下綱目不疏文帝出游楨見石人曰問彼石人彼服何粗何時去衛來游此都出世說續談助四注云此卷並魏上人魏王北征踰升嶺眺矚見一岡不生百草王粲曰此必古冢其人在世服生礜石熱蒸出外故草木焦滅遽令鑿看果是大墓礜石滿塋一說粲在荊州從劉表登嶂山而見此異曹武北征粲猶在江南以此為然出異苑續談助四管寧避難遼東還泛海遭船傾沒乃思其愆過曰吾曾一朝科頭三晨晏起今天怒猥集過必在此海録碎事八節引末有風乃息三字出異苑續談助四紺珠集二魏管輅嘗夜見一小物狀如獸手持火向口吹之將爇舍宇輅命門生舉刀奮擊斷腰視之狐也自此里中無火災廣記四百四十七王朗中年以識度推華歆歆蠟日嘗與子姪宴飲王亦學之有人向張茂先稱此事張曰王之學華蓋是形骸之外去之所以更遠出世說續談助四華歆遇子弟甚整雅間室之內儼若朝典陳元方兄弟恣柔愛之道二門之中兩不失其雍熙之軌度焉出世說續談助四魏國初建潘勗字元茂為策命文自漢武以來未有此制勗乃依商周憲章唐虞辭義溫雅與典誥同風于時朝士皆莫能措一字勗亡後王仲宣擅名於當時時人見此策美或疑是仲宣所為論者紛紛及晉王為太傅臘日大會賓客勗子蒲時亦在焉宣王謂之曰尊君有封魏君策高妙信不可及吾曾聞仲宣亦以為不如朝廷之士乃知勗作也御覽五百九十三中華佛法雖始於漢明帝然經偈故是胡音陳思王登魚山臨東阿聞巖岫有誦經聲清婉遒亮遠谷有流響肅然靈氣不覺斂襟祗敬便有終焉之志諸曹解音以為妙唱之極即善則之今梵唄皆植依擬所造也植亡乃葬此土出異苑續談助四傅巽有知人之鑒在房州目龐統為半英雄後統附劉備見待次諸葛亮如其言續談助四平原人有善治傴者自云不善人百一人耳有人曲度八尺直度六尺乃厚貨求治曰君且欲上背踏之傴者曰將殺我曰趣令君直焉知死事出笑林續談助四董昭為魏武重臣後失勢文明之世下為衛尉昭乃厚加意於侏儒正朝大會侏儒作董衛尉啼面言其太祖時事舉坐大笑明帝悵然不怡月中遷為司徒出語林續談助四凌雲臺至高韋誕書榜即日皓首有未正募工整之有鈴下卒著屐發緣如履平地疑其有術問之云兩腋各有肉翅長寸許紺珠集二晉撫軍云何平叔巧纍於理嵇叔夜雋傷其道出郭子續談助四王輔嗣注易笑鄭玄云老奴甚無意於時夜久忽聞外閣有著屐聲須臾即入自云是鄭玄責之曰君年少何以穿鑿文句而妄譏老子極有怒色言竟便退而輔嗣心生畏惡經少時乃暴疾而卒出幽明録續談助四景王欲誅夏侯玄意未決間問王安孚云己才足以制之否孚云昔趙儼葬兒汝來半坐迎之泰初後至一座悉起以此方之恐汝不如乃殺之出語林續談助四鍾育鍾會少有令譽年十三魏文帝聞之語其父繇曰令卿二子來於是敕見育面有汗帝問曰卿面何以汗育對曰戰戰惶惶汗出如漿復問會卿何以不汗出會對曰戰戰栗栗汗不敢出又值其父晝寢因共偷服散酒其父時覺且假寐以觀之育拜而後飲會飲而不拜既問之育曰酒以成禮不敢不拜又問會何以不拜會曰偷本非禮所以不拜廣記一百七十四鐘會撰四本論始畢甚欲嵇公看致之懷中既詣宅畏其有難懼不敢相示出戶遙擲而去出世說續談助四鐘士季常向人道吾少年時一紙書人云是阮步兵書皆字字生義既知是吾不復道也出語林續談助四阮德如每欲逸走家人常以一細繩橫繫戶前以維之每欲逸走至繩輒返時人以為名士狂出世說續談助四德如嘗於廁見一鬼長丈餘色黑而眼大著白單衣平上幘去之咫尺德如心安氣定徐笑而謂之曰人言鬼可憎果然如是鬼赧而退出幽明録續談助四桓宣武征蜀猶見諸葛亮時小吏年百餘歲桓問諸葛丞相今與誰比意頗欲自矜答曰葛公在時亦不覺異自葛公歿後正不見其比出雜記續談助四注云此卷並吳蜀人說郛二十五武侯躬耕於南陽困學紀聞十引此句於字據補南陽是襄陽墟名非南陽郡也出異苑續談助四襄陽郡有諸葛孔明故宅故宅有井深五丈廣五尺堂前有三間屋地基址極高云是避水臺宅西有山臨水孔明常登之鼓琴而為梁甫吟因名此山為樂山先有董家居此宅衰殄滅亡後人不敢復憩焉出襄陽記續談助四孫策年十四在壽陽詣袁術始至而劉豫州到便求去袁曰豫州何關君答曰不英雄忌人即出下東階而劉備從西階上但輒顧視之行殆不復前出語林續談助四顧邵為豫章毀諸廟至廬山廟一郡悉諫不從夜忽有人開閣徑前狀若方相說是廬山君與邵談春秋燈火盡燒左傳以續之鬼反和遜求復廟笑而不答出志怪續談助四沈峻珩之弟也甚有名譽而性儉吝張溫使蜀與峻別峻入良久謂溫曰向擇一端布欲以相送而無粗者溫嘉其能自顯其非出笑林續談助四諸葛恪對南陽韓文晃誤呼其父字晃曰向人前呼其父字為是禮邪恪笑而答曰向天穿針不見天者其輕於天意有所在耳續談助四孫皓初立治後園得一金像如今之灌頂佛桉此下有闕文旌異記具載之未莫皓陰痛不可堪采女有奉法者啓皓取像香湯浴之置殿上燒香懺悔痛即便止出志咸徹心記續談助四杜預書告兒古詩有書借人為可嗤借書送還亦可嗤海録碎事十八王安豐云山巨源初不見老易而意暗與之同晉武帝講武於宣揚場欲偃武修文山公謂不宜爾因與諸尚書言孫武用兵本意後寇盜蜂合郡國無備不能復制皆如公言時以為濤不學孫吳而暗與會王夷甫亦歎其暗與道合出世說續談助四注云此卷並晉江左人裴令公目王安豐眼爛爛如巖下電出語林續談助四裴令公姿容爽俊疾困武帝使王夷甫往看之裴先向壁臥聞王來強回視之夷甫出語人曰雙眸爛爛如巖下電精神挺動故有小惡耳出世說續談助四魏時殿前鐘忽大鳴震駭省署張華曰此蜀銅山崩故鐘鳴應之也蜀尋上事果云銅山崩時日皆如華言廣記一百九十七中朝時蜀有人畜銅澡盤晨夕恆鳴如人扣以白張華華曰此盤與洛鐘宮商相諧宮中朝莫撞鐘故聲相應可鑢令輕則韻乖鳴自止也依言即不復鳴廣記一百九十七武庫內有雄雉時人咸謂為怪華云此蛇之所化也即使搜除庫中果見蛇蛻之皮廣記一百九十七吳郡臨平岸崩出一石鼓打之無聲以問華華曰可取蜀中桐材刻作魚形扣之則鳴矣即從華言聲聞數十里廣記一百九十七嵩高山北有大穴空莫測其深百姓歲時每游其上晉初嘗有一人誤墜穴中同輩冀其倘不死試投食於穴墜者得之為糧乃緣穴而行可十許日忽曠然見明又有草屋一區中有二人對坐圍碁局下有一杯白飲墜者告以飢渴碁者曰可飲此墜者飲之氣力十倍碁者曰汝欲停此不墜者曰不願停碁者曰汝從西行數十步有一井其中多怪異慎勿畏但投身入中當得出若飢即可取井中物食之墜者如其言井多蛟龍然墜者輒避其路墜者緣井而行井中有物若青泥墜者食之了不覺飢可半年許乃出蜀中因歸洛下問張華華曰此仙館所飲者玉漿所食者龍穴石髓也廣記一百九十七晉張華有鸚鵡每出還輒說僮僕好惡一日寂無言華問其故曰被禁在甕中何繇得知鐵圍山叢談六羊琇驕豪搗炭為屑以香和之作獸形出列傳續談助四羊稚舒冬月釀酒令人抱甕暖之須臾復易其人酒既速成味仍嘉美其驕豪皆此類出語林續談助四夏侯湛作周詩成以示潘嶽嶽曰此文非徒溫雅乃別見孝悌之性嶽因此作家風詩出世說續談助四注云此卷並晉江左人孫子荊新除婦服作詩示王武子武子曰不知文生於情情生於文覽之悽然生伉儷之重出世說續談助四裴僕射時人謂言談之林藪出頠別傳續談助四注云此卷並晉江左人劉道真年十五六在門前戲鼻上垂鼻涕至胸洛下少年乘車從門前過曰此少年甚𠲛塠劉隨車後問此言為善為惡答以為善紺珠集引作道真問此言佳否云佳劉曰若佳言令爾翁𠲛塠爾母𠲛塠出雜記說郛二十五紺珠集二海録碎事八新淦聶友小兒貧賤常獵見一白鹿射中之後見箭著梓樹出志怪說郛二十五士衡在坐安仁來陸便起去潘曰清風至塵飛揚陸應聲答曰衆鳥集鳳皇翔出語林續談助四說郛二十五士衡為河北都督已遭間構內懷憂悶聞其鼓吹謂司馬孫拯曰我今聞之不如聞華亭鶴唳出小史續談助四蔡司徒說在洛陽見陸機兄弟住參佐中三間瓦屋士龍住東頭士衡住西頭困學紀聞二十阮瞻作無鬼論忽有人謁阮曰鬼神之道古今聖賢共傳君何獨言無即僕便是忽異形須臾消滅後年餘遇病而卒出列傳續談助四宋岱為青州刺史禁淫祀著無鬼論人莫能屈鄰州咸化之後有一書生詣岱岱理稍屈書生乃振衣而起曰君絶我輩血食二十餘年君有青牛髯奴所以未得相困耳今奴已叛牛已死此日得相制矣言訖失書生明日而岱亡出雜記續談助四昔傅亮北征在河中流或人問之曰潘安仁作懷舊賦曰前瞻太室傍眺嵩丘嵩丘太室一山何云前瞻傍眺哉亮對曰有嵩丘山去太室七十里此是寫書人誤耳文選潘嶽懷舊賦注齊宜都王鏗三歲喪母及有識問母所在左右告以早亡便思慕蔬食祈請幽冥求一夢見至六歲夢見一婦人謂之曰我是汝之母鏗悲泣旦說之容貌衣服事事如平生也御覽四百十一鄭餘慶處分廚家爛蒸去毛莫拗折項客以為必是鵝鴨乃是爛蒸葫蘆海録碎事六引商藝小說學者當取三多看讀多持論多著述多三多之中持論為難為文須辭相稱不然同乎按檢無足取海録碎事十八引小說
